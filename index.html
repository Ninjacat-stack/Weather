<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App UI</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="weather-card">
        <div class="search-box">
            <input type="text" placeholder="Enter city name..." class="search-input">
            <button class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div class="weather-info">
            <h1 class="city">Mumbai, India</h1>
            <p class="date"></p>
            
            <div class="temperature">
                <h1>32°C</h1>
            </div>
            
            <div class="description">
                <img class="icon" src='//cdn.weatherapi.com/weather/64x64/night/143.png' alt="">
                <p class="iconName">Clear Sky</p>
            </div>
            
            <div class="details">
                <div class="col">
                    <i class="fas fa-water"></i>
                    <div>
                        <p class="humidity-val">65%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <i class="fas fa-wind"></i>
                    <div>
                        <p class="wind-val">12 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
